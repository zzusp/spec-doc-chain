<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 1. 背景：深紫靛蓝渐变 -->
  <defs>
    <linearGradient id="back_grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5851DB"/>
      <stop offset="1" stop-color="#4038B0"/>
    </linearGradient>
    
    <!-- 内部核心的发光 -->
    <filter id="core_glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- 渐变线条 -->
    <linearGradient id="line_grad" x1="82" y1="84" x2="118" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5851DB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="48" fill="url(#back_grad)"/>
  
  <!-- 2. 双重轨道：虚线外圈与实线内圈 -->
  <!-- 虚线外圈 -->
  <circle cx="100" cy="100" r="70" stroke="white" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.15"/>
  <!-- 实线内圈：找回并重新优化的内轨道 -->
  <circle cx="100" cy="100" r="58" stroke="white" stroke-width="1" opacity="0.1"/>

  <!-- 3. 中心 Agent 核心 (Intelligence Core) -->
  <rect x="68" y="68" width="64" height="64" rx="18" fill="white" filter="url(#core_glow)"/>
  
  <!-- 4. 核心内部：精密的需求指令 -->
  <rect x="82" y="84" width="36" height="6" rx="3" fill="url(#line_grad)"/>
  <rect x="82" y="97" width="24" height="6" rx="3" fill="url(#line_grad)"/>
  <rect x="82" y="110" width="36" height="6" rx="3" fill="url(#line_grad)"/>

  <!-- 5. 状态节点 (Milestones) -->
  <!-- 绿点上方的多余线条已排除 -->
  <circle cx="100" cy="30" r="5.5" fill="#00FFA3" filter="url(#core_glow)"/> <!-- 顶端：验证/收敛 -->
  <circle cx="170" cy="100" r="3.5" fill="white" opacity="0.7" /> <!-- 右侧 -->
  <circle cx="30" cy="100" r="3.5" fill="white" opacity="0.7" /> <!-- 左侧 -->
  <circle cx="100" cy="170" r="3.5" fill="white" opacity="0.7" /> <!-- 底端 -->
</svg>
